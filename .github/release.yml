changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - dependabot
  categories:
    - title: Fixed
      labels:
        - bug
        - fix
    - title: Added
      labels:
        - feature
        - enhancement
    - title: Changed
      labels:
        - refactor
        - chore
    - title: Documentation
      labels:
        - docs
    - title: Other Changes
      labels:
        - "*"
